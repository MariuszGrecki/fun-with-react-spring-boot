spring.application.name=learning-tracker

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/learning_tracker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:learning_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:learning_password}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

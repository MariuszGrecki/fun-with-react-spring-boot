services:
  db:
    image: postgres:16-alpine
    container_name: learning-tracker-db
    environment:
      POSTGRES_DB: learning_tracker
      POSTGRES_USER: learning_user
      POSTGRES_PASSWORD: learning_password
    ports:
      - "5133:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learning_user -d learning_tracker"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: learning-tracker-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/learning_tracker
      SPRING_DATASOURCE_USERNAME: learning_user
      SPRING_DATASOURCE_PASSWORD: learning_password
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173
      JAVA_TOOL_OPTIONS: >-
        -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:15005
    ports:
      - "18081:8080"
      - "15005:15005"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: learning-tracker-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres-data:
  frontend-node-modules:
